# ================================================================
# MUNDO ROBERTH AGENT OS — Docker Compose (VPS Hostinger)
# ================================================================
# Deploy: docker compose up -d
# Logs: docker compose logs -f hermes

services:
  # ----------------------------------------------------------------
  # HERMES — Bot Telegram
  # ----------------------------------------------------------------
  hermes:
    build:
      context: ..
      dockerfile: docker/hermes/Dockerfile
    container_name: hermes-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL}
      - TELEGRAM_ADMIN_USER_ID=${TELEGRAM_ADMIN_USER_ID}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - AI_PROVIDER=${AI_PROVIDER}
      - AI_MODEL=${AI_MODEL}
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - agent-os-network
    labels:
      - "com.agent-os.service=hermes"

  # ----------------------------------------------------------------
  # WORKER — Filas e Jobs
  # ----------------------------------------------------------------
  worker:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    container_name: agent-os-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - AI_PROVIDER=${AI_PROVIDER}
      - AI_MODEL=${AI_MODEL}
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - NOTION_API_TOKEN=${NOTION_API_TOKEN}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - agent-os-network
    labels:
      - "com.agent-os.service=worker"

  # ----------------------------------------------------------------
  # REDIS — Cache e filas rápidas
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: agent-os-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - agent-os-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------------
  # NGINX — Proxy reverso (para webhook do Telegram)
  # ----------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: agent-os-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - hermes
    networks:
      - agent-os-network
    labels:
      - "com.agent-os.service=nginx"

networks:
  agent-os-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
